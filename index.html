<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin & Win Challenge</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#141e30,#243b55);
  color:#fff;
  text-align:center;
}

.box{
  max-width:420px;
  margin:30px auto;
  padding:20px;
}

h1{font-size:22px}

.wheel{
  width:250px;
  height:250px;
  border-radius:50%;
  border:8px solid #fff;
  margin:20px auto;
}

.btn{
  padding:14px;
  width:100%;
  margin:10px 0;
  border:none;
  border-radius:10px;
  background:#00ffc3;
  font-weight:bold;
  cursor:pointer;
}

#quiz,#result{
  display:none;
}

.progress{
  height:8px;
  background:#ffffff30;
  border-radius:20px;
  overflow:hidden;
  margin:15px 0;
}

.bar{
  height:100%;
  width:0%;
  background:#00ffc3;
}
</style>
</head>

<body>

<div class="box">

<!-- SPIN -->
<div id="spin">
  <h1>🎁 Spin & Win</h1>
  <p>You have 1 chance today</p>
  <div class="wheel" id="wheel"></div>
  <button class="btn" onclick="spin()">SPIN NOW</button>
</div>

<!-- QUIZ -->
<div id="quiz">
  <h1>🔒 Verify Your Reward</h1>
  <p>Answer 2 quick questions</p>

  <div class="progress"><div class="bar" id="bar"></div></div>

  <h2 id="q"></h2>
  <div id="answers"></div>
</div>

<!-- RESULT -->
<div id="result">
  <h1>🎉 Congratulations!</h1>
  <p>You unlocked your reward</p>
  <button class="btn" onclick="go()">Claim Now</button>
</div>

</div>

<script>
const CPA = "https://max.bountyads.store/?utm_medium=8ebfe9ea8ea08199550e9d5cbe70ee55dbafe5f7&utm_campaign=IQ";

let spun = false;

function spin(){
  if(spun) return;
  spun = true;

  let w = document.getElementById("wheel");
  w.style.transition="3s";
  w.style.transform="rotate(1440deg)";

  setTimeout(()=>{
    alert("Almost! 😳\nAnswer 2 questions to unlock reward");
    document.getElementById("spin").style.display="none";
    document.getElementById("quiz").style.display="block";
    load();
  },3000);
}

let i=0;

let questions=[
  {q:"Which color is sky?",a:["Blue","Green","Red"]},
  {q:"2+2=?",a:["3","4","5"]}
];

function load(){
  let q=questions[i];
  document.getElementById("q").innerText=q.q;

  let answers=document.getElementById("answers");
  answers.innerHTML="";

  document.getElementById("bar").style.width=(i/questions.length*100)+"%";

  q.a.forEach(a=>{
    let b=document.createElement("button");
    b.className="btn";
    b.innerText=a;
    b.onclick=next;
    answers.appendChild(b);
  });
}

function next(){
  i++;
  if(i<questions.length){
    load();
  }else{
    finish();
  }
}

function finish(){
  document.getElementById("quiz").style.display="none";
  document.getElementById("result").style.display="block";
}

function go(){
  window.location.href = CPA;
}
</script>

</body>
</html>
